# Local stack for the Acme Travel ERP.
# - app + db: the application and its database (SPEC-0001: GET /api/system/health returns UP).
# - prometheus + loki + alloy + grafana: the observability stack (SPEC-0027 / Phase 11). `docker
#   compose up` brings the whole thing up; metrics and logs land in Grafana (datasources + dashboard
#   pre-provisioned). Configuration via .env (see .env.example).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-acme_erp}
      POSTGRES_USER: ${DB_USERNAME:-acme}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-acme}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-acme} -d ${DB_NAME:-acme_erp}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [acme]

  # Dev IdP (SPEC-0024 Phase 13 / DL-0103). Keycloak with the `acme` realm imported (roles, the
  # public SPA client `acme-erp-web` with PKCE + refresh, and seed users — one per role + `dev`,
  # password dev12345, DEV ONLY). The browser and the backend both reach it at http://localhost:8088
  # so the token `iss` matches what the resource server validates (the app container resolves
  # `localhost` to the host gateway — see `extra_hosts` on `app`). Not for production.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm", "--http-port=8088"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: http://localhost:8088
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      # Enable the management health endpoint (KC 26 serves /health on port 9000) for the healthcheck.
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/realm-acme.json:/opt/keycloak/data/import/realm-acme.json:ro
    ports:
      - "${KEYCLOAK_PORT:-8088}:8088"
    # KC 26's micro image has no curl/wget, but ships bash with /dev/tcp — probe the management
    # health endpoint (port 9000) for readiness. Force bash (sh has no /dev/tcp).
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [acme]

  app:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-acme_erp}
      DB_USERNAME: ${DB_USERNAME:-acme}
      DB_PASSWORD: ${DB_PASSWORD:-acme}
      SERVER_PORT: "8080"
      # Security (SPEC-0024 Phase 13 / DL-0104): validate the dev Keycloak realm's JWTs by JWKS. The
      # token `iss` carries the PUBLIC URL the browser used (localhost:8088), validated via
      # OIDC_ISSUER_URI; the keys are fetched INTERNALLY from the keycloak service (OIDC_JWK_SET_URI)
      # — avoiding the localhost-in-container resolution trap.
      OIDC_ISSUER_URI: ${OIDC_ISSUER_URI:-http://localhost:8088/realms/acme}
      OIDC_JWK_SET_URI: http://keycloak:8088/realms/acme/protocol/openid-connect/certs
      # Observability (SPEC-0027/DL-0096): in the container, emit structured JSON logs (ECS) so
      # Grafana Alloy can ship them to Loki. Dev/local runs keep the human-readable console
      # (logging.pattern.console) — this override only applies to the containerized app.
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ${LOGGING_STRUCTURED_FORMAT_CONSOLE:-ecs}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks: [acme]

  # ---- Observability stack (SPEC-0027 / Phase 11) ----

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Bearer token for the role-gated /actuator/prometheus scrape (DL-0095). Generate it once and
      # drop it at infra/prometheus/scrape-token (NOT versioned) — see infra/prometheus/README.md.
      - ./infra/prometheus/scrape-token:/etc/prometheus/scrape-token:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks: [acme]

  loki:
    image: grafana/loki:latest
    user: root
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    networks: [acme]

  alloy:
    image: grafana/alloy:latest
    user: root
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks: [acme]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
      - loki
    networks: [acme]

volumes:
  db-data:
  loki-data:
  grafana-data:

networks:
  acme:
    driver: bridge
