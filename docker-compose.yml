# Local stack for the Acme Travel ERP.
# - app + db: the application and its database (SPEC-0001: GET /api/system/health returns UP). The
#   OIDC IdP is SELF-HOSTED inside `app` (embedded Spring Authorization Server — Phase 17/ADR-0018);
#   there is NO separate Keycloak service anymore (removed — DL-0114).
# - prometheus + loki + alloy + grafana: the observability stack (SPEC-0027 / Phase 11). `docker
#   compose up` brings the whole thing up; metrics and logs land in Grafana (datasources + dashboard
#   pre-provisioned). Configuration via .env (see .env.example).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-acme_erp}
      POSTGRES_USER: ${DB_USERNAME:-acme}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-acme}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-acme} -d ${DB_NAME:-acme_erp}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [acme]

  app:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-acme_erp}
      DB_USERNAME: ${DB_USERNAME:-acme}
      DB_PASSWORD: ${DB_PASSWORD:-acme}
      SERVER_PORT: "8080"
      # Auth (SPEC-0024 Phase 17 / ADR-0018 / DL-0110/0114): the OIDC IdP is now SELF-HOSTED — the
      # Spring Authorization Server runs EMBEDDED in this app (Keycloak removed — DL-0114). The app is
      # both the issuer and the Resource Server: the token `iss` is the PUBLIC URL the browser used
      # (localhost:8080), validated via OIDC_ISSUER_URI; the keys are served by this same app at
      # /oauth2/jwks (OIDC_JWK_SET_URI reaches the app itself). The dev seed users (dev/e2e profile,
      # password dev12345, DEV ONLY) live in the local store (V32).
      SPRING_PROFILES_ACTIVE: dev
      OIDC_ISSUER_URI: ${OIDC_ISSUER_URI:-http://localhost:8080}
      OIDC_JWK_SET_URI: http://localhost:8080/oauth2/jwks
      # Observability (SPEC-0027/DL-0096): in the container, emit structured JSON logs (ECS) so
      # Grafana Alloy can ship them to Loki. Dev/local runs keep the human-readable console
      # (logging.pattern.console) — this override only applies to the containerized app.
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ${LOGGING_STRUCTURED_FORMAT_CONSOLE:-ecs}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks: [acme]

  # ---- Observability stack (SPEC-0027 / Phase 11) ----

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Bearer token for the role-gated /actuator/prometheus scrape (DL-0095). Generate it once and
      # drop it at infra/prometheus/scrape-token (NOT versioned) — see infra/prometheus/README.md.
      - ./infra/prometheus/scrape-token:/etc/prometheus/scrape-token:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks: [acme]

  loki:
    image: grafana/loki:latest
    user: root
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    networks: [acme]

  alloy:
    image: grafana/alloy:latest
    user: root
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks: [acme]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
      - loki
    networks: [acme]

volumes:
  db-data:
  loki-data:
  grafana-data:

networks:
  acme:
    driver: bridge
