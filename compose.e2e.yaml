# Isolated, throwaway stack for the Playwright E2E suite (SPEC-0028 / DL-0101).
#
# Its Postgres is EPHEMERAL (tmpfs — lives in RAM, wiped when the container stops), so running the
# E2E tests NEVER touches the development database in docker-compose.yml (which uses the named volume
# `db-data`). Self-contained: needs no .env. Different project name (`acme-e2e`), network (`acme-e2e`)
# and host ports (frontend 4201, backend 8081) than the dev stack (4200/8080/5432) so both can run side
# by side and an E2E run cannot collide with — or reach — dev data.
#
#   docker compose -f compose.e2e.yaml up -d --build   # or: npm run e2e:up   (from frontend/)
#   E2E_BASE_URL=http://localhost:4201 npm run e2e      # default baseURL is already 4201
#   docker compose -f compose.e2e.yaml down -v          # npm run e2e:down  (-v removes any volume)
name: acme-e2e

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: acme_e2e
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: acme
    # Ephemeral storage: data lives in tmpfs (RAM) and evaporates on container stop — no named volume,
    # so nothing persists to disk and nothing can leak into the dev database (BR1/DL-0101).
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acme -d acme_e2e"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [acme-e2e]

  # Dev IdP for the E2E stack (SPEC-0024 Phase 13 / DL-0103). Same `acme` realm import as the dev
  # stack (roles, public SPA client, seed users — password dev12345, E2E ONLY). Exposed on host port
  # 8089 (the dev stack uses 8088) so both stacks can run side by side. The browser and the E2E
  # backend both reach it at http://localhost:8089/realms/acme so the token `iss` matches.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm", "--http-port=8089"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8089
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      # Enable the management health endpoint (KC 26 serves /health on port 9000) for the healthcheck.
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/realm-acme.json:/opt/keycloak/data/import/realm-acme.json:ro
    ports:
      - "8089:8089"
    # KC 26's micro image has no curl/wget, but ships bash with /dev/tcp — probe the management
    # health endpoint (port 9000) for readiness. Force bash (sh has no /dev/tcp).
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'",
        ]
      interval: 10s
      timeout: 5s
      retries: 40
    networks: [acme-e2e]

  app:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/acme_e2e
      DB_USERNAME: acme
      DB_PASSWORD: acme
      SERVER_PORT: "8080"
      # Validate the E2E Keycloak realm's JWTs by JWKS (SPEC-0024 Phase 13 / DL-0104). The token `iss`
      # carries the PUBLIC URL the browser used (localhost:8089), validated via OIDC_ISSUER_URI; the
      # keys are fetched INTERNALLY from the keycloak service (OIDC_JWK_SET_URI) — avoiding the
      # localhost-in-container trap. Seed users (password dev12345) live in the realm — E2E ONLY.
      OIDC_ISSUER_URI: http://localhost:8089/realms/acme
      OIDC_JWK_SET_URI: http://keycloak:8089/realms/acme/protocol/openid-connect/certs
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks: [acme-e2e]

  frontend:
    build:
      context: ./frontend
    ports:
      - "4201:80"
    depends_on:
      - app
    networks: [acme-e2e]

networks:
  acme-e2e:
    driver: bridge
