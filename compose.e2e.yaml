# Isolated, throwaway stack for the Playwright E2E suite (SPEC-0028 / DL-0101).
#
# Its Postgres is EPHEMERAL (tmpfs — lives in RAM, wiped when the container stops), so running the
# E2E tests NEVER touches the development database in docker-compose.yml (which uses the named volume
# `db-data`). Self-contained: needs no .env. Different project name (`acme-e2e`), network (`acme-e2e`)
# and host ports (frontend 4201, backend 8081) than the dev stack (4200/8080/5432) so both can run side
# by side and an E2E run cannot collide with — or reach — dev data.
#
#   docker compose -f compose.e2e.yaml up -d --build   # or: npm run e2e:up   (from frontend/)
#   E2E_BASE_URL=http://localhost:4201 npm run e2e      # default baseURL is already 4201
#   docker compose -f compose.e2e.yaml down -v          # npm run e2e:down  (-v removes any volume)
name: acme-e2e

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: acme_e2e
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: acme
    # Ephemeral storage: data lives in tmpfs (RAM) and evaporates on container stop — no named volume,
    # so nothing persists to disk and nothing can leak into the dev database (BR1/DL-0101).
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acme -d acme_e2e"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [acme-e2e]

  app:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/acme_e2e
      DB_USERNAME: acme
      DB_PASSWORD: acme
      SERVER_PORT: "8080"
      # Auth is SELF-HOSTED and EMBEDDED (SPEC-0024 Phase 17 / ADR-0018 / DL-0114): the app is its own
      # OIDC IdP (Spring Authorization Server) — no Keycloak in the E2E stack anymore. The `e2e` profile
      # seeds the local users (password dev12345, E2E ONLY) into the local store (V32). The token `iss`
      # is the PUBLIC URL the browser used (localhost:8081), validated via OIDC_ISSUER_URI; the keys are
      # served by this same app at /oauth2/jwks (reaches the app itself).
      SPRING_PROFILES_ACTIVE: e2e
      OIDC_ISSUER_URI: http://localhost:8081
      OIDC_JWK_SET_URI: http://localhost:8080/oauth2/jwks
      # The SPA (served on 4201) calls the AS discovery/jwks/token cross-origin — allow that origin.
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4201
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    networks: [acme-e2e]

  frontend:
    build:
      context: ./frontend
    ports:
      - "4201:80"
    depends_on:
      - app
    networks: [acme-e2e]

networks:
  acme-e2e:
    driver: bridge
