<div class="login">
  <div class="login__card app-card">
    <div class="login__brand">
      <i class="pi pi-globe" aria-hidden="true"></i>
      <span>{{ 'shell.brand' | translate }}</span>
    </div>
    <h1 class="login__title">{{ 'login.title' | translate }}</h1>
    <p class="login__hint">{{ 'login.ssoHint' | translate }}</p>

    <p-button
      type="button"
      icon="pi pi-sign-in"
      [disabled]="submitting()"
      [loading]="submitting()"
      styleClass="login__submit"
      data-testid="login-sso"
      [label]="(submitting() ? 'login.submitting' : 'login.ssoSubmit') | translate"
      (onClick)="signIn()"
    />
  </div>
</div>
