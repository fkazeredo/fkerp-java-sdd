<div class="login">
  <form class="login__card app-card" (ngSubmit)="submit()" #f="ngForm">
    <div class="login__brand">
      <i class="pi pi-globe" aria-hidden="true"></i>
      <span>{{ 'shell.brand' | translate }}</span>
    </div>
    <h1 class="login__title">{{ 'login.title' | translate }}</h1>

    <div class="field">
      <label for="login-username">{{ 'login.username' | translate }}</label>
      <input
        pInputText
        id="login-username"
        name="username"
        [(ngModel)]="username"
        required
        autocomplete="username"
      />
    </div>

    <div class="field">
      <label for="login-password">{{ 'login.password' | translate }}</label>
      <p-password
        inputId="login-password"
        name="password"
        [(ngModel)]="password"
        [feedback]="false"
        [toggleMask]="true"
        autocomplete="current-password"
        required
      />
    </div>

    @if (errorCode()) {
      <p-message severity="error" styleClass="login__error" data-testid="login-error">
        {{ errorCode() | translate }}
      </p-message>
    }

    <p-button
      type="submit"
      [disabled]="submitting() || f.invalid"
      [loading]="submitting()"
      styleClass="login__submit"
      [label]="(submitting() ? 'login.submitting' : 'login.submit') | translate"
    />
  </form>
</div>
