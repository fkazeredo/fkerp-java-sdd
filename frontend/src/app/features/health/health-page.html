<section class="page">
  <h1 class="page__title">{{ 'health.title' | translate }}</h1>

  @if (state() === 'loading') {
    <div class="health__loading" data-testid="health-loading">
      <p-progress-spinner [attr.aria-label]="'health.loading' | translate" />
      <p class="app-muted">{{ 'health.loading' | translate }}</p>
    </div>
  }

  @if (state() === 'success') {
    <p-card data-testid="health-success" styleClass="health__card">
      <p-message severity="success" styleClass="health__ok">{{ 'health.ok' | translate }}</p-message>
      <dl class="kv health__kv">
        <dt>{{ 'health.status' | translate }}</dt>
        <dd><p-tag [value]="health()?.status ?? ''" severity="success" /></dd>
        <dt>{{ 'health.db' | translate }}</dt>
        <dd><p-tag [value]="health()?.db ?? ''" severity="success" /></dd>
      </dl>
    </p-card>
  }

  @if (state() === 'error') {
    <p-card data-testid="health-error" styleClass="health__card">
      <p-message severity="error">{{ 'health.error' | translate }}</p-message>
      <div class="actions">
        <p-button
          [label]="'health.retry' | translate"
          icon="pi pi-refresh"
          (onClick)="load()"
        />
      </div>
    </p-card>
  }
</section>
