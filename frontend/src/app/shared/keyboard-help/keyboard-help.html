<p-dialog
  [(visible)]="open"
  [modal]="true"
  [dismissableMask]="true"
  [draggable]="false"
  [resizable]="false"
  [header]="'command.help.title' | translate"
  [style]="{ width: '30rem', maxWidth: '92vw' }"
>
  <dl class="keyboard-help__list">
    <div class="keyboard-help__row">
      <dt>{{ 'command.help.palette' | translate }}</dt>
      <dd><kbd>Ctrl</kbd> / <kbd>⌘</kbd> + <kbd>K</kbd></dd>
    </div>
    <div class="keyboard-help__row">
      <dt>{{ 'command.help.thisHelp' | translate }}</dt>
      <dd><kbd>?</kbd></dd>
    </div>
    @for (command of shortcuts(); track command.id) {
      <div class="keyboard-help__row">
        <dt>{{ command.labelKey | translate }}</dt>
        <dd><kbd>{{ command.hint }}</kbd></dd>
      </div>
    }
  </dl>
</p-dialog>
