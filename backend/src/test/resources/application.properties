# Test overrides for the payment mock (SPEC-0017 / ADR 0006 / DL-0048).
# delay-ms=0 so a webhook is immediately "due" and tests can drive delivery deterministically via
# MockPayoutJobDispatcher#deliverDue() (no sleeping). The scheduled dispatch interval is pushed far
# out so the background scheduler never races the explicit, deterministic delivery in tests.
integration.payment.mock.delay-ms=0
integration.payment.mock.dispatch.initial-delay-ms=3600000
integration.payment.mock.dispatch.interval-ms=3600000
