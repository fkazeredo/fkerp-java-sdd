# Mensagens em pt-BR (locale padrão do projeto).
validation.failed=Falha de validação
error.internal=Ocorreu um erro inesperado
system.health.up=Serviço saudável
request.malformed=Requisição malformada.
request.parameter-invalid=Parâmetro inválido.

# Accounts (SPEC-0002)
account.document.invalid=Documento inválido para o tipo informado.
account.document.duplicate=Documento já cadastrado.
account.not-found=Conta não encontrada.

# Exchange (SPEC-0003)
exchange.pair.invalid=Par de moeda inválido.
exchange.rate.invalid=Taxa de câmbio inválida (deve ser maior que zero).
exchange.rate.not-found=Nenhuma taxa vigente para o par informado.

# Exchange exposição (SPEC-0011)
exchange.market-rate.not-found=Nenhuma taxa de mercado observada para o par informado.
exchange.position.not-found=Posição cambial não encontrada para a reserva informada.
exchange.period.invalid=Período inválido (formato esperado AAAA-MM).

# Commissioning (SPEC-0004)
commissioning.pct.invalid=Percentual deve estar entre 0 e 1.
commissioning.base.invalid=Base comissionável não pode ser negativa.

# Quoting (SPEC-0005)
quoting.account.not-found=Conta não encontrada para compor a cotação.
quoting.rate.missing=Não há taxa de câmbio vigente para compor a cotação.
quoting.not-found=Cotação não encontrada.
quoting.override.reason-required=Motivo do override é obrigatório.
quoting.override.currency-mismatch=Moeda do valor aplicado difere da moeda sugerida.
quoting.override.not-applicable=Override não se aplica a uma cotação integrada (preço externo confiável).

# Booking (SPEC-0006)
booking.quote.not-found=Cotação não encontrada para a reserva.
booking.not-found=Reserva não encontrada.
booking.transition.invalid=Transição de estado inválida para a reserva.
booking.locator.duplicate=Localizador já cadastrado.
booking.locator.invalid=Localizador inválido (código obrigatório).

# Reconciliation (SPEC-0007)
reconciliation.case.not-found=Caso de conciliação não encontrado.
reconciliation.currency.mismatch=Moeda do valor realizado difere da esperada (BRL).

# Finance (SPEC-0015)
finance.party.invalid=Parte do lançamento inválida (id e tipo obrigatórios).
finance.period.invalid=Período inválido (formato esperado AAAA-MM).
finance.entry.not-found=Lançamento financeiro não encontrado.
finance.entry.transition.invalid=Transição de status do lançamento inválida.
finance.period.closed=Período já fechado: lançamento deve ir para um período aberto.
finance.period.cannot-close=Período não pode fechar: há lançamentos sem o documento obrigatório.

# Compliance (SPEC-0008)
compliance.document.not-found=Documento não encontrado.
compliance.retention.not-expired=Expurgo negado: documento dentro do prazo legal de guarda.
compliance.upload.invalid=Upload inválido (tipo, tamanho ou conteúdo do arquivo).

# Sourcing + Integration (SPEC-0009)
sourcing.offer.invalid=Oferta inválida (texto do produto é obrigatório).
sourcing.offer.not-found=Oferta sourced não encontrada.
integration.signature.invalid=Assinatura do webhook inválida ou ausente.
integration.payload.invalid=Payload de integração inválido.
integration.account.not-found=Conta não encontrada para o documento informado.

# Cancellation / Merchant trap / No-show (SPEC-0010)
cancellation.policy.invalid=Política de cancelamento inválida (janelas ou percentuais malformados).

# Ponto eletrônico — crawler + AFD/AEJ (SPEC-0012)
point.snapshot.not-found=Snapshot de ponto não encontrado.
point.snapshot.invalid=Coleta de ponto inválida (origem, período ou conteúdo do espelho).
point.afd.invalid=AFD/AEJ inválido (assinatura ou integridade do arquivo não conferem).

# Intelligence / DSS (SPEC-0013)
intelligence.insight.not-found=Insight não encontrado.
intelligence.decision.invalid=Decisão inválida (deve ser ACCEPTED, REJECTED ou DISMISSED).

# CommercialPolicy — parâmetros governados (SPEC-0014)
policy.parameter.unknown=Parâmetro sem padrão do sistema (key não governada).
policy.rule.invalid=Regra inválida (vigência, valor ou justificativa malformados).
policy.directive.forbidden=Sem permissão para definir esta regra/diretiva (papel insuficiente).

# Billing — NF de comissão / ISS / retenções (SPEC-0016)
billing.invoice.not-found=Nota fiscal de comissão não encontrada.
billing.invoice.already-issued=Transição inválida da nota (já emitida ou não cancelável).
billing.base.invalid=Base da nota inválida (deve ser a comissão, valor não negativo).
billing.municipality.rejected=Emissão rejeitada pela prefeitura: {0}
billing.nfse.webservice-failure=Falha na comunicação com o webservice municipal de NFS-e.

# Payout — repasse / liquidação / reembolso / parcelamento (SPEC-0017)
payout.not-found=Repasse não encontrado.
payout.payee.invalid=Beneficiário inválido (id e tipo são obrigatórios).
payout.amount.invalid=Valor do repasse inválido (deve ser positivo; taxa de liquidação > 0; parcelas devem somar o total).
payout.refund.origin-required=Reembolso exige a obrigação de origem (não se cria reembolso solto).
payout.already-executed=Repasse já executado (sem pagamento dobrado).
payout.transition.invalid=Transição de status do repasse inválida.
payout.gateway.failure=Falha na comunicação com o provedor de pagamento.
payout.webhook.signature.invalid=Assinatura do webhook de pagamento inválida ou ausente.

# AfterSales — chamados / alteração / reembolso / SLA (SPEC-0018)
aftersales.case.not-found=Chamado de pós-venda não encontrado.
aftersales.case.invalid=Chamado inválido (reserva e tipo são obrigatórios).
aftersales.case.transition.invalid=Transição de status do chamado inválida.
aftersales.refund.duplicate=Reembolso já encaminhado para este chamado (sem reembolso em dobro).

# Marketing — consentimento / segmentação / campanha / atribuição (SPEC-0019)
marketing.consent.invalid=Consentimento inválido (titular, finalidade e base legal são obrigatórios).
marketing.consent.not-found=Consentimento não encontrado.
marketing.segment.invalid=Segmento inválido (critério desconhecido ou mal formado).
marketing.campaign.not-found=Campanha não encontrada.
marketing.campaign.invalid=Campanha inválida (segmento e código são obrigatórios).
marketing.newsletter.failure=Falha na comunicação com o provedor de newsletter.
