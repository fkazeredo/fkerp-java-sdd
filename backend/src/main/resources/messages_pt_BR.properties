# Mensagens em pt-BR (locale padrão do projeto).
validation.failed=Falha de validação
error.internal=Ocorreu um erro inesperado
system.health.up=Serviço saudável
request.malformed=Requisição malformada.
request.parameter-invalid=Parâmetro inválido.

# Accounts (SPEC-0002)
account.document.invalid=Documento inválido para o tipo informado.
account.document.duplicate=Documento já cadastrado.
account.not-found=Conta não encontrada.

# Exchange (SPEC-0003)
exchange.pair.invalid=Par de moeda inválido.
exchange.rate.invalid=Taxa de câmbio inválida (deve ser maior que zero).
exchange.rate.not-found=Nenhuma taxa vigente para o par informado.

# Commissioning (SPEC-0004)
commissioning.pct.invalid=Percentual deve estar entre 0 e 1.
commissioning.base.invalid=Base comissionável não pode ser negativa.

# Quoting (SPEC-0005)
quoting.account.not-found=Conta não encontrada para compor a cotação.
quoting.rate.missing=Não há taxa de câmbio vigente para compor a cotação.
quoting.not-found=Cotação não encontrada.
quoting.override.reason-required=Motivo do override é obrigatório.
quoting.override.currency-mismatch=Moeda do valor aplicado difere da moeda sugerida.

# Booking (SPEC-0006)
booking.quote.not-found=Cotação não encontrada para a reserva.
booking.not-found=Reserva não encontrada.
booking.transition.invalid=Transição de estado inválida para a reserva.
booking.locator.duplicate=Localizador já cadastrado.
booking.locator.invalid=Localizador inválido (código obrigatório).

# Reconciliation (SPEC-0007)
reconciliation.case.not-found=Caso de conciliação não encontrado.
reconciliation.currency.mismatch=Moeda do valor realizado difere da esperada (BRL).

# Finance (SPEC-0015)
finance.party.invalid=Parte do lançamento inválida (id e tipo obrigatórios).
finance.period.invalid=Período inválido (formato esperado AAAA-MM).
finance.entry.not-found=Lançamento financeiro não encontrado.
finance.entry.transition.invalid=Transição de status do lançamento inválida.
finance.period.closed=Período já fechado: lançamento deve ir para um período aberto.
finance.period.cannot-close=Período não pode fechar: há lançamentos sem o documento obrigatório.

# Compliance (SPEC-0008)
compliance.document.not-found=Documento não encontrado.
compliance.retention.not-expired=Expurgo negado: documento dentro do prazo legal de guarda.
compliance.upload.invalid=Upload inválido (tipo, tamanho ou conteúdo do arquivo).
