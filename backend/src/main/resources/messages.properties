# Default (fallback) messages — English.
# Project default locale is pt-BR (see messages_pt_BR.properties).
validation.failed=Validation failed
error.internal=An unexpected error occurred
system.health.up=Service is healthy
request.malformed=Malformed request.
request.parameter-invalid=Invalid parameter.
resource.not-found=Resource not found.

# Accounts (SPEC-0002)
account.document.invalid=Invalid document for the given legal type.
account.document.duplicate=Document already registered.
account.not-found=Account not found.

# Exchange (SPEC-0003)
exchange.pair.invalid=Invalid currency pair.
exchange.rate.invalid=Invalid exchange rate (must be greater than zero).
exchange.rate.not-found=No prevailing rate for the given pair.

# Exchange exposure (SPEC-0011)
exchange.market-rate.not-found=No market rate observed for the given pair.
exchange.position.not-found=FX position not found for the given booking.
exchange.period.invalid=Invalid period (expected YYYY-MM).

# Commissioning (SPEC-0004)
commissioning.pct.invalid=Percentage must be between 0 and 1.
commissioning.base.invalid=Commissionable base cannot be negative.

# Quoting (SPEC-0005)
quoting.account.not-found=Account not found for composing the quote.
quoting.rate.missing=No prevailing exchange rate to compose the quote.
quoting.not-found=Quote not found.
quoting.override.reason-required=Override reason is required.
quoting.override.currency-mismatch=Applied amount currency differs from the suggested currency.
quoting.override.not-applicable=Override does not apply to an integrated quote (trusted external price).

# Booking (SPEC-0006)
booking.quote.not-found=Quote not found for the booking.
booking.not-found=Booking not found.
booking.transition.invalid=Invalid booking state transition.
booking.locator.duplicate=Locator already registered.
booking.locator.invalid=Invalid locator (code required).

# Reconciliation (SPEC-0007)
reconciliation.case.not-found=Reconciliation case not found.
reconciliation.currency.mismatch=Realized value currency differs from the expected (BRL).

# Finance (SPEC-0015)
finance.party.invalid=Invalid ledger party (id and type are required).
finance.period.invalid=Invalid period (expected format YYYY-MM).
finance.entry.not-found=Ledger entry not found.
finance.entry.transition.invalid=Invalid ledger entry status transition.
finance.period.closed=Period already closed: the entry must go to an open period.
finance.period.cannot-close=Period cannot close: there are entries missing the mandatory document.

# Compliance (SPEC-0008)
compliance.document.not-found=Document not found.
compliance.retention.not-expired=Purge denied: the document is within its legal retention period.
compliance.upload.invalid=Invalid upload (file type, size or content).

# Sourcing + Integration (SPEC-0009)
sourcing.offer.invalid=Invalid offer (product text is required).
sourcing.offer.not-found=Sourced offer not found.
integration.signature.invalid=Invalid or missing webhook signature.
integration.payload.invalid=Invalid integration payload.
integration.account.not-found=No account found for the given document.

# Cancellation / Merchant trap / No-show (SPEC-0010)
cancellation.policy.invalid=Invalid cancellation policy (malformed windows or percentages).

# Point clock — crawler + AFD/AEJ (SPEC-0012)
point.snapshot.not-found=Point snapshot not found.
point.snapshot.invalid=Invalid point collection (source, period or mirror content).
point.afd.invalid=Invalid AFD/AEJ (file signature or integrity check failed).

# Intelligence / DSS (SPEC-0013)
intelligence.insight.not-found=Insight not found.
intelligence.decision.invalid=Invalid decision (must be ACCEPTED, REJECTED or DISMISSED).

# CommercialPolicy — governed parameters (SPEC-0014)
policy.parameter.unknown=Parameter has no system default (key is not governed).
policy.rule.invalid=Invalid rule (malformed effectivity, value or justification).
policy.directive.forbidden=Not allowed to define this rule/directive (insufficient role).

# Billing — commission invoice / ISS / withholdings (SPEC-0016)
billing.invoice.not-found=Commission invoice not found.
billing.invoice.already-issued=Invalid invoice transition (already issued or not cancellable).
billing.base.invalid=Invalid invoice base (must be the commission, a non-negative amount).
billing.municipality.rejected=Issuance rejected by the municipality: {0}
billing.nfse.webservice-failure=Failure communicating with the municipal NFS-e webservice.

# Payout — repass / settlement / refund / installments (SPEC-0017)
payout.not-found=Payout not found.
payout.payee.invalid=Invalid payee (id and type are required).
payout.amount.invalid=Invalid payout amount (must be positive; settlement rate > 0; installments must sum to the total).
payout.refund.origin-required=A refund must reference its origin obligation (no loose refund).
payout.already-executed=Payout already executed (no double payment).
payout.transition.invalid=Invalid payout status transition.
payout.gateway.failure=Failure communicating with the payment provider.
payout.webhook.signature.invalid=Invalid or missing payment webhook signature.

# AfterSales — cases / change / refund / SLA (SPEC-0018)
aftersales.case.not-found=Support case not found.
aftersales.case.invalid=Invalid case (booking reference and type are required).
aftersales.case.transition.invalid=Invalid support case status transition.
aftersales.refund.duplicate=A refund was already triggered for this case (no double refund).

# Marketing — consent / segmentation / campaign / attribution (SPEC-0019)
marketing.consent.invalid=Invalid consent (subject, purpose and legal basis are required).
marketing.consent.not-found=Consent not found.
marketing.segment.invalid=Invalid segment (unknown or malformed criteria).
marketing.campaign.not-found=Campaign not found.
marketing.campaign.invalid=Invalid campaign (segment and code are required).
marketing.newsletter.failure=Failure communicating with the newsletter provider.

# Portfolio — represented brands / contracts / goals (SPEC-0020)
portfolio.brand.not-found=Represented brand not found.
portfolio.brand.duplicate=A brand with that identifier (brandRef) already exists.
portfolio.brand.invalid=Invalid brand (identifier and display name are required).
portfolio.contract.invalid=Invalid representation contract (missing or inconsistent validity window).
portfolio.goal.invalid=Invalid goal (brand/period/metric are required; target consistent with the metric; no duplicate).

# Assets — internal patrimony (SPEC-0021)
assets.asset.not-found=Asset not found.
assets.asset.invalid=Invalid asset (type, identifier, acquisition date and acquisition cost are required).
assets.license.expiry-required=A software license requires an expiry date (expiresAt).
assets.asset.already-retired=The asset is already retired (it cannot be retired again).

# People — HR (collaborators / journey / time-bank / discrepancies) (SPEC-0022)
people.employee.not-found=Employee not found.
people.employee.duplicate=Identifier already registered for another employee.
people.employee.invalid=Invalid employee (identifier, admission date and contracted journey HH:mm are required).
people.journey.not-found=Processed journey not found for the given employee and period.
people.journey.invalid=Invalid journey processing (period YYYY-MM, snapshot reference and non-negative worked time are required).

# Platform — certificate custody / job governance / system audit (SPEC-0023)
platform.certificate.not-found=No e-CNPJ certificate is custodied.
platform.certificate.unavailable=Certificate custody is unavailable.
platform.job.not-found=Scheduled job not found.
platform.job.locked=The job is already running (another instance holds the lock).

# Identity — authentication / roles / access audit (SPEC-0024)
identity.credentials.invalid=Invalid username or password.
auth.unauthenticated=Authentication required (missing or invalid token).
access.denied=Access denied: insufficient role for this action.

# Admin — administrative suppliers / contracts / expenses (SPEC-0025)
admin.supplier.not-found=Administrative supplier not found.
admin.supplier.invalid=Invalid administrative supplier (type and display name are required).
admin.contract.invalid=Invalid administrative contract (validity window missing or inconsistent).
admin.expense.invalid=Invalid administrative expense (supplier, period, amount and kind are required).
admin.expense.duplicate=An expense already exists for that supplier, period and kind.

# Cadastro — editable reference data (SPEC-0031)
cadastro.item.invalid=Invalid cadastro item (type, code and label are required).
cadastro.item.not-found=Cadastro item not found.
cadastro.item.duplicate=A cadastro item already exists for that type and code.
cadastro.code.invalid=Invalid reference code "{1}" for type {0} (unknown or inactive).
sourcing.quarantine.not-found=Quarantined inbound quotation not found.
sourcing.quarantine.not-pending=Quarantine entry was already replayed or discarded.
