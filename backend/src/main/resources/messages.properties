# Default (fallback) messages — English.
# Project default locale is pt-BR (see messages_pt_BR.properties).
validation.failed=Validation failed
error.internal=An unexpected error occurred
system.health.up=Service is healthy
request.malformed=Malformed request.
request.parameter-invalid=Invalid parameter.

# Accounts (SPEC-0002)
account.document.invalid=Invalid document for the given legal type.
account.document.duplicate=Document already registered.
account.not-found=Account not found.

# Exchange (SPEC-0003)
exchange.pair.invalid=Invalid currency pair.
exchange.rate.invalid=Invalid exchange rate (must be greater than zero).
exchange.rate.not-found=No prevailing rate for the given pair.

# Commissioning (SPEC-0004)
commissioning.pct.invalid=Percentage must be between 0 and 1.
commissioning.base.invalid=Commissionable base cannot be negative.

# Quoting (SPEC-0005)
quoting.account.not-found=Account not found for composing the quote.
quoting.rate.missing=No prevailing exchange rate to compose the quote.
quoting.not-found=Quote not found.
quoting.override.reason-required=Override reason is required.
quoting.override.currency-mismatch=Applied amount currency differs from the suggested currency.
quoting.override.not-applicable=Override does not apply to an integrated quote (trusted external price).

# Booking (SPEC-0006)
booking.quote.not-found=Quote not found for the booking.
booking.not-found=Booking not found.
booking.transition.invalid=Invalid booking state transition.
booking.locator.duplicate=Locator already registered.
booking.locator.invalid=Invalid locator (code required).

# Reconciliation (SPEC-0007)
reconciliation.case.not-found=Reconciliation case not found.
reconciliation.currency.mismatch=Realized value currency differs from the expected (BRL).

# Finance (SPEC-0015)
finance.party.invalid=Invalid ledger party (id and type are required).
finance.period.invalid=Invalid period (expected format YYYY-MM).
finance.entry.not-found=Ledger entry not found.
finance.entry.transition.invalid=Invalid ledger entry status transition.
finance.period.closed=Period already closed: the entry must go to an open period.
finance.period.cannot-close=Period cannot close: there are entries missing the mandatory document.

# Compliance (SPEC-0008)
compliance.document.not-found=Document not found.
compliance.retention.not-expired=Purge denied: the document is within its legal retention period.
compliance.upload.invalid=Invalid upload (file type, size or content).

# Sourcing + Integration (SPEC-0009)
sourcing.offer.invalid=Invalid offer (product text is required).
sourcing.offer.not-found=Sourced offer not found.
integration.signature.invalid=Invalid or missing webhook signature.
integration.payload.invalid=Invalid integration payload.
integration.account.not-found=No account found for the given document.
