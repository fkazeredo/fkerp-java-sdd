spring:
  application:
    name: acme-travel-erp
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/acme_erp}
    username: ${DB_USERNAME:acme}
    password: ${DB_PASSWORD:acme}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Security (SPEC-0024 — re-graduated in Phase 17, ADR-0018/DL-0110). The OIDC IdP is now SELF-HOSTED:
  # the Spring Authorization Server runs EMBEDDED in THIS app (Keycloak removed — DL-0114). The ERP is
  # both the Authorization Server (issuer) and the Resource Server: it validates its own JWTs by JWKS
  # (RS256, local RSA key). Since the AS lives in the same app on the same origin, issuer-uri and
  # jwk-set-uri point at THIS app's base URL:
  #  - issuer-uri:  the PUBLIC base URL the token's `iss` carries (the AuthorizationServerSettings
  #                 issuer). Used to VALIDATE `iss` and — with jwk-set-uri unset — to discover the JWKS.
  #  - jwk-set-uri: the AS JWK set endpoint on this same app (/oauth2/jwks), served by the local key.
  # In the 'test' profile a local test JwtDecoder bean is provided instead (no live issuer — DL-0105),
  # so neither URI is contacted and the AS is not booted.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8080}
          jwk-set-uri: ${OIDC_JWK_SET_URI:http://localhost:8080/oauth2/jwks}

server:
  port: ${SERVER_PORT:8080}

# Self-hosted Authorization Server (SPEC-0024 Phase 17 / ADR-0018 / DL-0110). The public issuer the AS
# stamps into the token `iss` and advertises at /.well-known/openid-configuration. Leave blank to let
# the AS derive it per-request (works in dev 8080 and the E2E stack 8081 without a hardcoded host); set
# it explicitly (matching resourceserver issuer-uri above) when the public URL differs from the request.
#
# Application metadata (SPEC-0027/DL-0097). app.version is filtered from the pom at build time
# (@project.version@ → e.g. 0.28.0), the SemVer source of truth (ADR 0015). It is the fallback for
# GET /api/version when BuildProperties (the packaged build-info) is absent (dev/test runs).
app:
  version: @project.version@
  oidc:
    issuer: ${OIDC_ISSUER_URI:}

management:
  endpoints:
    web:
      exposure:
        # Observability (SPEC-0027/DL-0095): expose ONLY these. Sensitive endpoints that leak internals
        # (env, beans, heapdump, threaddump, loggers, configprops, mappings, …) are deliberately NOT
        # exposed. Of these, health/info are public; prometheus/metrics require ROLE_IT (SecurityConfig).
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
  metrics:
    tags:
      # Common tag on every meter (SPEC-0027 AC8) so Prometheus/Grafana can scope by application.
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# Point-clock crawler (SPEC-0012). The vendor portal client is out of scope (DL-0029/0031): the
# default source binding is a traceable simulation. Tune the schedule, source list and the
# circuit-breaker/retry knobs here. Credentials are custodied by the Platform (never here — BR1).
point-clock:
  sources: ${POINT_CLOCK_SOURCES:REP-DEFAULT}      # comma-separated REP/branch refs (BR9/DL-0033)
  crawl:
    initial-delay-ms: ${POINT_CLOCK_INITIAL_DELAY_MS:600000}
    interval-ms: ${POINT_CLOCK_INTERVAL_MS:86400000} # daily (BR9/DL-0033)
    max-attempts: ${POINT_CLOCK_MAX_ATTEMPTS:3}      # retry budget before dead-letter (DL-0031)
  breaker:
    failure-threshold: ${POINT_CLOCK_BREAKER_THRESHOLD:3} # consecutive failures that open the breaker
    cooldown-ms: ${POINT_CLOCK_BREAKER_COOLDOWN_MS:60000}  # open → half-open cooldown

# Payment gateway (SPEC-0017 / ADR 0006 / DL-0048). The real provider (PIX/TED/boleto/gateway) is an
# Open Question: the default adapter is a traceable mock that confirms/fails via an async signed
# webhook. The webhook secret is the shared HMAC key (the scheme a real provider uses). Sensitive
# payment data is never logged or carried in config. Swapping in a real provider is a new adapter.
integration:
  # Webhook signatures cover `timestamp + "." + body` and reject a timestamp outside the tolerance
  # window (anti-replay — Fase 19c/DL-0122). In prod the secrets MUST be overridden (fail-fast:
  # ProdReadinessValidator, DL-0123).
  quotation-site:
    secret: ${QUOTATION_SITE_SECRET:dev-quotation-site-secret}
    replay-tolerance-seconds: ${QUOTATION_SITE_REPLAY_TOLERANCE_SECONDS:300}
  payment:
    webhook-secret: ${PAYMENT_WEBHOOK_SECRET:dev-payment-webhook-secret}
    replay-tolerance-seconds: ${PAYMENT_REPLAY_TOLERANCE_SECONDS:300}
    mock:
      delay-ms: ${PAYMENT_MOCK_DELAY_MS:3000}            # async confirmation delay (ADR 0006)
      dispatch:
        initial-delay-ms: ${PAYMENT_MOCK_DISPATCH_INITIAL_DELAY_MS:5000}
        interval-ms: ${PAYMENT_MOCK_DISPATCH_INTERVAL_MS:2000} # how often due webhooks are delivered

# Login brute-force lockout for the self-hosted Authorization Server form login (Fase 19c/DL-0125):
# after `max-attempts` consecutive failures a username is locked for `lock-seconds`; a success
# clears the counter. Only the counter/lock is stored — never a password (BR4).
security:
  login:
    max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
    lock-seconds: ${LOGIN_LOCK_SECONDS:900}

# Platform (SPEC-0023). The e-CNPJ certificate custody encrypts the secret material at rest with
# AES-256-GCM (DL-0074); the master key lives OUTSIDE the database. In production set a real 32-byte
# base64 key via PLATFORM_SECRET_KEY — the dev default is used only when unset and is NOT secure.
# WHERE to custody (cloud KMS / HSM / secret manager) and A1×A3 is the owner's Open Question; the
# SecretCipher port lets a real backend be plugged without touching the domain. No secret is logged.
platform:
  secret:
    key: ${PLATFORM_SECRET_KEY:}                 # 32-byte base64 master key (empty → dev-only default)
    key-alias: ${PLATFORM_SECRET_KEY_ALIAS:platform-default}
  certificate:
    expiry:
      horizon-days: ${PLATFORM_CERT_EXPIRY_HORIZON_DAYS:30}  # alert this many days before expiry (BR5)
      initial-delay-ms: ${PLATFORM_CERT_EXPIRY_INITIAL_DELAY_MS:600000}
      sweep-interval-ms: ${PLATFORM_CERT_EXPIRY_INTERVAL_MS:86400000} # daily

# Representation-expiry sweep (SPEC-0020/DL-0063), now driven as a governed Platform job (DL-0076).
portfolio:
  representation:
    initial-delay-ms: ${PORTFOLIO_REPRESENTATION_INITIAL_DELAY_MS:600000}
    sweep-interval-ms: ${PORTFOLIO_REPRESENTATION_INTERVAL_MS:86400000} # daily

# Identity (SPEC-0024 — graduated in Phase 13, DL-0104). Authentication is delegated to the external
# OIDC IdP (Keycloak): see spring.security.oauth2.resourceserver.jwt.issuer-uri above. There is no
# in-house JWT secret or seed users anymore — users and passwords live in the IdP (DL-0107).

logging:
  # Dev/local default: human-readable console with the correlation id from the MDC. In the container
  # the structured (JSON/ECS) format is enabled via LOGGING_STRUCTURED_FORMAT_CONSOLE (SPEC-0027/
  # DL-0096); when that is set, Spring Boot uses the structured layout instead of this pattern and
  # serializes the MDC — so the correlationId stays present, now as a JSON field, with no secret/PII
  # logged (BR5). Set logging.structured.format.console to ecs to preview the JSON locally.
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{correlationId:-}] %logger{36} - %msg%n"

# Billing (SPEC-0016). billing.tax.regime selects the pluggable TaxRegimeStrategy (DL-0044).
# regime-confirmed (DL-0121/SPEC-0016 BR8) records the ACCOUNTANT's confirmation of the real
# enquadramento (Anexo III x V / Fator R): while false, the prod-readiness validation (Fase 19c)
# must refuse a production boot that could issue a REAL NFS-e. Dev/test are unaffected (the NFS-e
# gateway is a traceable mock - DL-0046).
billing:
  tax:
    regime: ${BILLING_TAX_REGIME:SIMPLES_NACIONAL}
    regime-confirmed: ${BILLING_TAX_REGIME_CONFIRMED:false}
