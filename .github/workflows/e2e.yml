name: E2E

# Playwright end-to-end tests against the ISOLATED, throwaway stack (SPEC-0028 / DL-0102): an
# ephemeral Postgres (tmpfs), backend (dev profile) and Nginx frontend on port 4201 — it NEVER touches
# any development database. The job brings the stack up, waits for health, runs Playwright headless,
# and ALWAYS tears the stack down (if: always()).
on:
  push:
    branches: [main, develop, "feature/**", "release/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

jobs:
  e2e:
    name: Playwright E2E (isolated stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Bring up the isolated E2E stack
        run: docker compose -f compose.e2e.yaml up -d --build

      - name: Wait for the backend to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8081/api/system/health | grep -q '"status":"UP"'; then
              echo "backend UP after ~$((i*5))s"; exit 0
            fi
            echo "waiting for backend... ($i)"; sleep 5
          done
          echo "backend did not become healthy in time"; exit 1

      - name: Run Playwright (headless)
        working-directory: frontend
        env:
          CI: "true"
          E2E_BASE_URL: http://localhost:4201
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Tear down the E2E stack (always)
        if: always()
        run: docker compose -f compose.e2e.yaml down -v
